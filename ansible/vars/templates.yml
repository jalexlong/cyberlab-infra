---
templates:
  - id: debian13
    name: tpl-debian13-base
    display_name: "Debian 13"
    vmid: 900
    test_clone_vmid: 950
    build_method: cloud_image
    enabled: true

    os_family: debian
    version: "13"

    image_url: "https://cloud.debian.org/images/cloud/trixie/latest/debian-13-genericcloud-amd64.qcow2"
    image_filename: "debian-13-genericcloud-amd64.qcow2"

    target_node: pve1
    memory: 2048
    cores: 2
    sockets: 1
    cpu: x86-64-v2-AES
    machine: q35
    bios: seabios
    scsihw: virtio-scsi-single
    disk_storage: local-lvm
    cloudinit_storage: local-lvm

    bridge: prov0
    net_model: virtio
    serial_socket: true
    vga: serial0
    agent_enabled: true

    ci_user: cyberlab
    ci_upgrade: true

    bootstrap_ip: 10.30.0.10
    bootstrap_ipconfig0: "ip=10.30.0.10/24,gw=10.30.0.1"
    ipconfig0: "ip=dhcp"

    boot: order=scsi0
    description: "Cyberlab Debian 13 base template"
    tags: "template;debian13;linux;base"


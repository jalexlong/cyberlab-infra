---
- name: Build Cyberlab templates from controller
  hosts: proxmox_targets
  gather_facts: false

  vars_files:
    - ../vars/templates.yml

  vars:
    image_cache_dir: /var/lib/vz/template/qcow2

  tasks:
    - name: Ensure image cache directory exists
      ansible.builtin.file:
        path: "{{ image_cache_dir }}"
        state: directory
        mode: "0755"

    - name: Select enabled cloud-image templates
      ansible.builtin.set_fact:
        enabled_cloud_templates: >-
          {{
            template_catalog
            | selectattr('enabled', 'equalto', true)
            | selectattr('build_method', 'equalto', 'cloud_image')
            | list
          }}

    - name: Show enabled cloud-image templates
      ansible.builtin.debug:
        msg: "{{ enabled_cloud_templates | map(attribute='name') | list }}"

    - name: Download cloud images
      ansible.builtin.get_url:
        url: "{{ item.image_url }}"
        dest: "{{ image_cache_dir }}/{{ item.image_filename }}"
        mode: "0644"
        force: false
      loop: "{{ enabled_cloud_templates }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Check whether template VM already exists
      ansible.builtin.command:
        argv:
          - qm
          - status
          - "{{ item.vmid | string }}"
      register: qm_status_results
      failed_when: false
      changed_when: false
      loop: "{{ enabled_cloud_templates }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Create VM shells for missing templates
      ansible.builtin.command:
        argv:
          - qm
          - create
          - "{{ item.item.vmid | string }}"
          - --name
          - "{{ item.item.name }}"
          - --memory
          - "{{ item.item.memory | string }}"
          - --cores
          - "{{ item.item.cores | string }}"
          - --sockets
          - "{{ item.item.sockets | string }}"
          - --cpu
          - "{{ item.item.cpu }}"
          - --machine
          - "{{ item.item.machine }}"
          - --bios
          - "{{ item.item.bios }}"
          - --scsihw
          - "{{ item.item.scsihw }}"
          - --net0
          - "{{ item.item.net_model }},bridge={{ item.item.bridge }}"
          - --agent
          - "{{ 1 if item.item.agent_enabled else 0 }}"
          - --ostype
          - l26
      when: item.rc != 0
      loop: "{{ qm_status_results.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Check whether imported disk already exists
      ansible.builtin.shell: >
        qm config {{ item.vmid }} | grep -q '^scsi0:'
      args:
        executable: /bin/bash
      register: disk_present_results
      failed_when: false
      changed_when: false
      loop: "{{ enabled_cloud_templates }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Import cloud disk for missing templates
      ansible.builtin.command:
        argv:
          - qm
          - importdisk
          - "{{ item.item.vmid | string }}"
          - "{{ image_cache_dir }}/{{ item.item.image_filename }}"
          - "{{ item.item.disk_storage }}"
      when: item.rc != 0
      loop: "{{ disk_present_results.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Attach imported disk to scsi0
      ansible.builtin.command:
        argv:
          - qm
          - set
          - "{{ item.item.vmid | string }}"
          - --scsi0
          - "{{ item.item.disk_storage }}:vm-{{ item.item.vmid }}-disk-0,discard=on,ssd=1"
      when: item.rc != 0
      loop: "{{ disk_present_results.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Attach cloud-init disk
      ansible.builtin.command:
        argv:
          - qm
          - set
          - "{{ item.vmid | string }}"
          - --ide2
          - "{{ item.cloudinit_storage }}:cloudinit"
      register: cloudinit_attach_results
      failed_when: false
      changed_when: cloudinit_attach_results.rc == 0
      loop: "{{ enabled_cloud_templates }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Read controller SSH public key from controller CT
      ansible.builtin.command:
        argv:
          - pct
          - exec
          - "800"
          - --
          - cat
          - /root/.ssh/id_ed25519_controller.pub
      register: controller_template_pubkey
      changed_when: false

    - name: Write controller SSH public key to temporary file for qm sshkey import
      ansible.builtin.copy:
        dest: /tmp/controller-template-key.pub
        mode: "0644"
        content: "{{ controller_template_pubkey.stdout }}"

    - name: Configure template VM defaults
      ansible.builtin.command:
        argv:
          - qm
          - set
          - "{{ item.vmid | string }}"
          - --boot
          - "{{ item.boot }}"
          - --bootdisk
          - scsi0
          - --serial0
          - "{{ 'socket' if item.serial_socket else '' }}"
          - --vga
          - "{{ item.vga }}"
          - --ciuser
          - "{{ item.ci_user }}"
          - --ciupgrade
          - "{{ 1 if item.ci_upgrade else 0 }}"
          - --ipconfig0
          - "{{ item.ipconfig0 }}"
          - --sshkey
          - /tmp/controller-template-key.pub
          - --description
          - "{{ item.description }}"
          - --tags
          - "{{ item.tags }}"
      loop: "{{ enabled_cloud_templates }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: true

    - name: Remove temporary controller SSH public key file
      ansible.builtin.file:
        path: /tmp/controller-template-key.pub
        state: absent

    - name: Remove empty serial0 argument for non-serial templates
      ansible.builtin.command:
        argv:
          - qm
          - set
          - "{{ item.vmid | string }}"
          - --delete
          - serial0
      when: not item.serial_socket
      failed_when: false
      changed_when: false
      loop: "{{ enabled_cloud_templates }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Show resulting template configs
      ansible.builtin.command:
        argv:
          - qm
          - config
          - "{{ item.vmid | string }}"
      register: final_template_configs
      changed_when: false
      loop: "{{ enabled_cloud_templates }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Print template summary
      ansible.builtin.debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ final_template_configs.results }}"
      loop_control:
        label: "{{ item.item.name }}"

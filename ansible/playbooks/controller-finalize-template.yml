---
- name: Finalize Cyberlab Debian template before promotion
  hosts: proxmox_targets
  gather_facts: false

  vars_files:
    - ../vars/templates.yml

  vars:
    finalize_template_name: tpl-debian13-base
    finalize_ssh_private_key: /root/.ssh/id_ed25519_controller
    finalize_ssh_user: cyberlab

  tasks:
    - name: Select template definition
      ansible.builtin.set_fact:
        template_def: >-
          {{
            (template_catalog | selectattr('name', 'equalto', finalize_template_name) | list | first)
          }}

    - name: Assert template definition exists
      ansible.builtin.assert:
        that:
          - template_def is defined
          - template_def.vmid is defined
        fail_msg: "Template definition for {{ finalize_template_name }} was not found."

    - name: Check whether VM is already a template
      ansible.builtin.shell: >
        qm config {{ template_def.vmid }} | grep -q '^template: 1$'
      args:
        executable: /bin/bash
      register: template_flag_check
      failed_when: false
      changed_when: false

    - name: Fail if VM is already converted to template
      ansible.builtin.assert:
        that:
          - template_flag_check.rc != 0
        fail_msg: >
          VM {{ template_def.vmid }} is already a Proxmox template.
          Rebuild it before running finalization.

    - name: Start template source VM
      ansible.builtin.command:
        argv:
          - qm
          - start
          - "{{ template_def.vmid | string }}"
      register: qm_start_result
      failed_when: false
      changed_when: qm_start_result.rc == 0

    - name: Wait for template source VM to be running
      ansible.builtin.command:
        argv:
          - qm
          - status
          - "{{ template_def.vmid | string }}"
      register: qm_running_wait
      retries: 12
      delay: 5
      until: "'status: running' in qm_running_wait.stdout"
      changed_when: false

    - name: Pause for cloud-init boot to settle
      ansible.builtin.pause:
        seconds: 45

    - name: Probe common lab networks for guest SSH
      ansible.builtin.shell: |
        set -euo pipefail
        for subnet in \
          10.64.62 \
          10.0.11 \
          10.0.12 \
          10.10.11 \
          10.10.12 \
          10.10.13 \
          10.10.14 \
          10.10.21 \
          10.10.22 \
          10.10.23 \
          10.10.24 \
          10.20.11 \
          10.20.12 \
          10.20.13 \
          10.20.14 \
          10.20.21 \
          10.20.22 \
          10.20.23 \
          10.20.24
        do
          for host in $(seq 2 254); do
            ip="${subnet}.${host}"
            if timeout 2 ssh -i {{ finalize_ssh_private_key }} \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o BatchMode=yes \
              -o ConnectTimeout=2 \
              {{ finalize_ssh_user }}@"${ip}" 'echo ok' 2>/dev/null | grep -q '^ok$'; then
              echo "${ip}"
              exit 0
            fi
          done
        done
        exit 1
      args:
        executable: /bin/bash
      register: guest_ip_result
      retries: 6
      delay: 20
      until: guest_ip_result.rc == 0
      changed_when: false

    - name: Set guest IP fact
      ansible.builtin.set_fact:
        template_guest_ip: "{{ guest_ip_result.stdout | trim }}"

    - name: Wait for SSH on guest
      ansible.builtin.wait_for:
        host: "{{ template_guest_ip }}"
        port: 22
        delay: 5
        timeout: 300

    - name: Finalize guest over SSH
      ansible.builtin.shell: >
        ssh -i {{ finalize_ssh_private_key }}
        -o StrictHostKeyChecking=no
        -o UserKnownHostsFile=/dev/null
        {{ finalize_ssh_user }}@{{ template_guest_ip }}
        'sudo bash -lc "
        export DEBIAN_FRONTEND=noninteractive
        apt-get update
        apt-get install -y qemu-guest-agent cloud-init sudo curl
        systemctl enable qemu-guest-agent || true
        systemctl enable cloud-init || true
        systemctl enable cloud-init-local || true
        systemctl enable cloud-config || true
        systemctl enable cloud-final || true
        cloud-init clean --logs || true
        truncate -s 0 /etc/machine-id
        rm -f /var/lib/dbus/machine-id
        rm -f /etc/ssh/ssh_host_*
        apt-get clean
        rm -rf /var/lib/apt/lists/*
        rm -rf /tmp/*
        rm -rf /var/tmp/*
        rm -f /root/.bash_history
        rm -f /home/{{ finalize_ssh_user }}/.bash_history
        sync
        "'
      args:
        executable: /bin/bash
      register: guest_finalize_ssh
      changed_when: guest_finalize_ssh.rc == 0

    - name: Shut down template source VM from inside guest
      ansible.builtin.shell: >
        ssh -i {{ finalize_ssh_private_key }}
        -o StrictHostKeyChecking=no
        -o UserKnownHostsFile=/dev/null
        {{ finalize_ssh_user }}@{{ template_guest_ip }}
        'sudo shutdown -h now'
      args:
        executable: /bin/bash
      failed_when: false
      changed_when: true

    - name: Wait for template source VM to stop
      ansible.builtin.command:
        argv:
          - qm
          - status
          - "{{ template_def.vmid | string }}"
      register: qm_status_wait
      retries: 30
      delay: 10
      until: "'status: stopped' in qm_status_wait.stdout"
      changed_when: false

    - name: Convert finalized VM to template
      ansible.builtin.command:
        argv:
          - qm
          - template
          - "{{ template_def.vmid | string }}"
      register: qm_template_result
      changed_when: qm_template_result.rc == 0

    - name: Show finalized template config
      ansible.builtin.command:
        argv:
          - qm
          - config
          - "{{ template_def.vmid | string }}"
      register: final_template_config
      changed_when: false

    - name: Print finalized template summary
      ansible.builtin.debug:
        msg: "{{ final_template_config.stdout_lines }}"

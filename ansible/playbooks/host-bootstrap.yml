- name: Bootstrap Proxmox host for Cyberlab
  hosts: proxmox_hosts
  gather_facts: false

  vars:
    controller_ctid: 800
    controller_repo_dir: /root/cyberlab-infra
    controller_private_dir: /root/cyberlab-infra/private
    controller_secrets_dir: /root/cyberlab-infra/private/secrets
    controller_ssh_key_path: /root/.ssh/id_ed25519_controller

    proxmox_api_user: cyberlab-automation@pve
    proxmox_api_token_name: automation
    proxmox_api_token_id_full: "{{ proxmox_api_user }}!{{ proxmox_api_token_name }}"
    proxmox_api_host: "{{ bootstrap_policy.bootstrap.proxmox.api_host | default('10.64.62.200') }}"
    proxmox_api_url: "https://{{ proxmox_api_host }}:8006/api2/json"

    repo_root: "{{ playbook_dir }}/../.."
    bootstrap_policy_file: "{{ repo_root }}/data/bootstrap-policy.yml"
    cyberlab_repo_url: "https://github.com/jalexlong/cyberlab-infra.git"
    cyberlab_repo_branch: "main"

  pre_tasks:
    - name: Load bootstrap policy
      include_vars:
        file: "{{ bootstrap_policy_file }}"
        name: bootstrap_policy

    - name: Assert bootstrap policy loaded
      assert:
        that:
          - bootstrap_policy.bootstrap is defined
          - bootstrap_policy.bootstrap.proxmox is defined
          - bootstrap_policy.bootstrap.controller_lxc is defined
          - bootstrap_policy.bootstrap.tooling is defined
        fail_msg: "bootstrap-policy.yml is missing required keys."

  tasks:
    - name: Ensure required host packages are installed
      apt:
        name:
          - dnsmasq
          - curl
          - sudo
          - python3
          - python3-apt
        state: present
        update_cache: true
      become: true

    - name: Check whether Proxmox automation user exists
      command: "pveum user list"
      register: pveum_user_list
      changed_when: false
      become: true

    - name: Create Proxmox automation user
      command: >
        pveum user add {{ bootstrap_policy.bootstrap.proxmox.automation_user }}
      when: bootstrap_policy.bootstrap.proxmox.automation_user not in pveum_user_list.stdout
      become: true

    - name: Check whether automation API token exists
      command: >
        pveum user token list {{ bootstrap_policy.bootstrap.proxmox.automation_user }}
      register: pveum_token_list
      changed_when: false
      failed_when: false
      become: true

    - name: Set token existence fact
      ansible.builtin.set_fact:
        automation_token_exists: >-
          {{
            pveum_token_list.rc == 0 and
            (bootstrap_policy.bootstrap.proxmox.automation_token_id in (pveum_token_list.stdout | default('')))
          }}

    - name: Check whether controller API secret file exists
      ansible.builtin.command:
        argv:
          - pct
          - exec
          - "{{ controller_ctid | string }}"
          - --
          - test
          - -f
          - "{{ controller_secrets_dir }}/proxmox-api.env"
      register: controller_api_secret_file_check
      failed_when: false
      changed_when: false
      become: true

    - name: Set controller secret existence fact
      ansible.builtin.set_fact:
        controller_api_secret_exists: "{{ controller_api_secret_file_check.rc == 0 }}"

    - name: Decide whether automation token must be rotated
      ansible.builtin.set_fact:
        automation_token_rotate_required: >-
          {{
            (bootstrap_policy.bootstrap.proxmox.rotate_token_if_secret_missing | default(true)) and
            automation_token_exists and
            (not controller_api_secret_exists)
          }}

    - name: Decide whether automation token must be created
      ansible.builtin.set_fact:
        automation_token_create_required: >-
          {{
            (not automation_token_exists) or automation_token_rotate_required
          }}

    - name: Explain token reconciliation decision
      ansible.builtin.debug:
        msg:
          - "automation_token_exists={{ automation_token_exists }}"
          - "controller_api_secret_exists={{ controller_api_secret_exists }}"
          - "automation_token_rotate_required={{ automation_token_rotate_required }}"
          - "automation_token_create_required={{ automation_token_create_required }}"

    - name: Remove existing automation API token when rotation is required
      ansible.builtin.command: >
        pveum user token remove
        {{ bootstrap_policy.bootstrap.proxmox.automation_user }}
        {{ bootstrap_policy.bootstrap.proxmox.automation_token_id }}
      when: automation_token_rotate_required
      register: automation_token_remove
      become: true

    - name: Create automation API token
      ansible.builtin.command: >
        pveum user token add
        {{ bootstrap_policy.bootstrap.proxmox.automation_user }}
        {{ bootstrap_policy.bootstrap.proxmox.automation_token_id }}
        --privsep 0
      register: automation_token_create
      when: automation_token_create_required
      become: true

    - name: Show automation token reconciliation output
      ansible.builtin.debug:
        msg: >-
          {{
            automation_token_create.stdout_lines
            if (automation_token_create is defined and automation_token_create.stdout is defined)
            else ['Token already existed and controller secret file was present; no token change made.']
          }}

    - name: Extract created automation token secret
      ansible.builtin.set_fact:
        automation_token_secret: "{{ automation_token_create.stdout | default('') | regex_search('([0-9a-zA-Z-]{36})') | default('') }}"

    - name: Check whether controller LXC already exists
      command: "pct config {{ bootstrap_policy.bootstrap.controller_lxc.ctid }}"
      register: controller_ct_check
      changed_when: false
      failed_when: false
      become: true

    - name: List available LXC templates
      command: "pveam available --section system"
      register: pveam_available
      changed_when: false
      become: true
      when: controller_ct_check.rc != 0

    - name: Download Debian 13 standard template if missing
      command: >
        pveam download local
        debian-13-standard_13.0-1_amd64.tar.zst
      register: pveam_download
      changed_when: "'downloaded' in (pveam_download.stdout | lower)"
      failed_when: false
      become: true
      when:
        - controller_ct_check.rc != 0
        - "'debian-13-standard_13.0-1_amd64.tar.zst' not in pveam_available.stdout"

    - name: Find local template volume path
      shell: "pveam list local | grep 'debian-13-standard' | awk '{print $1}' | tail -n 1"
      register: local_template_volume
      changed_when: false
      become: true
      when: controller_ct_check.rc != 0

    - name: Assert local Debian 13 template was found
      assert:
        that:
          - local_template_volume.stdout | length > 0
        fail_msg: "Could not find a local Debian 13 LXC template volume on storage 'local'."
      when: controller_ct_check.rc != 0

    - name: Create automation controller LXC
      command: >
        pct create {{ bootstrap_policy.bootstrap.controller_lxc.ctid }}
        {{ local_template_volume.stdout }}
        --hostname {{ bootstrap_policy.bootstrap.controller_lxc.hostname }}
        --cores {{ bootstrap_policy.bootstrap.controller_lxc.cores }}
        --memory {{ bootstrap_policy.bootstrap.controller_lxc.memory_mb }}
        --rootfs local-lvm:{{ bootstrap_policy.bootstrap.controller_lxc.disk_gb }}
        --net0 name=eth0,bridge={{ bootstrap_policy.bootstrap.controller_lxc.bridge }},ip=dhcp
        --unprivileged {{ 1 if bootstrap_policy.bootstrap.controller_lxc.unprivileged else 0 }}
        --onboot {{ 1 if bootstrap_policy.bootstrap.controller_lxc.start_on_boot else 0 }}
      become: true
      when: controller_ct_check.rc != 0

    - name: Start automation controller LXC
      command: "pct start {{ bootstrap_policy.bootstrap.controller_lxc.ctid }}"
      register: controller_start
      changed_when: controller_start.rc == 0
      failed_when: false
      become: true

    - name: Wait briefly after starting controller
      pause:
        seconds: 10

    - name: Copy bootstrap-controller.sh to Proxmox host temp path
      copy:
        src: "{{ repo_root }}/scripts/bootstrap-controller.sh"
        dest: /tmp/bootstrap-controller.sh
        mode: "0755"
      become: true

    - name: Push bootstrap-controller.sh into controller
      command: >
        pct push
        {{ bootstrap_policy.bootstrap.controller_lxc.ctid }}
        /tmp/bootstrap-controller.sh
        /tmp/bootstrap-controller.sh
      become: true

    - name: Check bootstrap script inside controller
      command: >
        pct exec {{ bootstrap_policy.bootstrap.controller_lxc.ctid }} --
        ls -l /tmp/bootstrap-controller.sh
      become: true

    - name: Make bootstrap-controller.sh executable inside controller
      command: >
        pct exec {{ bootstrap_policy.bootstrap.controller_lxc.ctid }} --
        chmod 0755 /tmp/bootstrap-controller.sh
      become: true

    - name: Run bootstrap-controller.sh inside controller
      command: >
        pct exec {{ bootstrap_policy.bootstrap.controller_lxc.ctid }} --
        env
        REPO_URL={{ cyberlab_repo_url }}
        REPO_BRANCH={{ cyberlab_repo_branch }}
        bash /tmp/bootstrap-controller.sh
      become: true

    - name: Ensure controller SSH directory exists
      ansible.builtin.command:
        argv:
          - pct
          - exec
          - "{{ controller_ctid | string }}"
          - --
          - install
          - -d
          - -m
          - "0700"
          - /root/.ssh
      become: true

    - name: Check whether controller SSH key exists
      ansible.builtin.command:
        argv:
          - pct
          - exec
          - "{{ controller_ctid | string }}"
          - --
          - test
          - -f
          - "{{ controller_ssh_key_path }}"
      register: controller_ssh_key_check
      failed_when: false
      changed_when: false
      become: true

    - name: Generate controller SSH keypair
      ansible.builtin.command:
        argv:
          - pct
          - exec
          - "{{ controller_ctid | string }}"
          - --
          - ssh-keygen
          - -t
          - ed25519
          - -N
          - ""
          - -f
          - "{{ controller_ssh_key_path }}"
      when: controller_ssh_key_check.rc != 0
      become: true

    - name: Read controller SSH public key
      ansible.builtin.command:
        argv:
          - pct
          - exec
          - "{{ controller_ctid | string }}"
          - --
          - cat
          - "{{ controller_ssh_key_path }}.pub"
      register: controller_ssh_pubkey
      changed_when: false
      become: true

    - name: Ensure root SSH directory exists on Proxmox host
      ansible.builtin.file:
        path: /root/.ssh
        state: directory
        owner: root
        group: root
        mode: "0700"
      become: true

    - name: Authorize controller SSH public key on Proxmox host
      ansible.builtin.lineinfile:
        path: /root/.ssh/authorized_keys
        line: "{{ controller_ssh_pubkey.stdout }}"
        create: true
        owner: root
        group: root
        mode: "0600"
        state: present
      become: true

    - name: Ensure controller secrets directory exists
      ansible.builtin.command:
        argv:
          - pct
          - exec
          - "{{ controller_ctid | string }}"
          - --
          - install
          - -d
          - -m
          - "0700"
          - "{{ controller_secrets_dir }}"
      become: true

    - name: Write Proxmox API env file on Proxmox host temp path when token was created or rotated
      ansible.builtin.copy:
        dest: /tmp/proxmox-api.env
        mode: "0600"
        content: |
          PROXMOX_API_URL={{ proxmox_api_url }}
          PROXMOX_API_TOKEN_ID={{ proxmox_api_token_id_full }}
          PROXMOX_API_TOKEN_SECRET={{ automation_token_create.stdout | default('') | regex_search('([0-9a-fA-F-]{36})') | default('') }}
      when:
        - automation_token_secret | length > 0
      become: true

    - name: Push Proxmox API env file into controller when token was created or rotated
      ansible.builtin.command:
        argv:
          - pct
          - push
          - "{{ controller_ctid | string }}"
          - /tmp/proxmox-api.env
          - "{{ controller_secrets_dir }}/proxmox-api.env"
      when:
        - automation_token_secret | length > 0
      become: true

    - name: Set permissions on Proxmox API env file inside controller
      ansible.builtin.command:
        argv:
          - pct
          - exec
          - "{{ controller_ctid | string }}"
          - --
          - chmod
          - "0600"
          - "{{ controller_secrets_dir }}/proxmox-api.env"
      when:
        - automation_token_secret | length > 0
      become: true

    - name: Remove temporary Proxmox API env file from Proxmox host
      ansible.builtin.file:
        path: /tmp/proxmox-api.env
        state: absent
      when:
        - automation_token_secret | length > 0
      become: true

    - name: Validate SSH from controller to Proxmox host
      ansible.builtin.command:
        argv:
          - pct
          - exec
          - "{{ controller_ctid | string }}"
          - --
          - bash
          - -lc
          - "ssh -i {{ controller_ssh_key_path }} -o StrictHostKeyChecking=no root@{{ proxmox_api_host }} hostname"
      register: controller_ssh_validation
      changed_when: false
      become: true

    - name: Validate API file exists inside controller
      ansible.builtin.command:
        argv:
          - pct
          - exec
          - "{{ controller_ctid | string }}"
          - --
          - test
          - -f
          - "{{ controller_secrets_dir }}/proxmox-api.env"
      register: controller_api_env_validation
      changed_when: false
      become: true

    - name: Show controller trust bootstrap summary
      ansible.builtin.debug:
        msg:
          - "Controller CT {{ controller_ctid }} SSH validation: {{ controller_ssh_validation.stdout }}"
          - "Controller API env file present: {{ controller_api_env_validation.rc == 0 }}"
          - "Proxmox API token id: {{ proxmox_api_token_id_full }}"
          - "Token existed before run: {{ automation_token_exists }}"
          - "Secret file existed before run: {{ controller_api_secret_exists }}"
          - "Token rotated this run: {{ automation_token_rotate_required }}"
          - "Token created this run: {{ automation_token_create_required }}"


    - name: Show controller status
      command: "pct status {{ bootstrap_policy.bootstrap.controller_lxc.ctid }}"
      register: controller_status
      changed_when: false
      become: true

    - name: Display controller bootstrap summary
      debug:
        msg:
          - "Automation user: {{ bootstrap_policy.bootstrap.proxmox.automation_user }}"
          - "Automation token id: {{ bootstrap_policy.bootstrap.proxmox.automation_token_id }}"
          - "Controller CTID: {{ bootstrap_policy.bootstrap.controller_lxc.ctid }}"
          - "Controller hostname: {{ bootstrap_policy.bootstrap.controller_lxc.hostname }}"
          - "Controller status: {{ controller_status.stdout }}"


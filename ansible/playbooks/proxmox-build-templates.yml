- name: Build cloud templates on Proxmox host
  hosts: poseidon
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  vars:
    template_script_src: "../../scripts/build-cloud-templates.sh"
    template_script_dest: "/home/alex/build-cloud-templates.sh"

  tasks:
    - name: Copy template build script to host
      copy:
        src: "{{ template_script_src }}"
        dest: "{{ template_script_dest }}"
        mode: "0755"

    - name: Build Debian template
      become: true
      command: "{{ template_script_dest }} debian"
      register: debian_build

    - name: Show Debian build output
      debug:
        var: debian_build.stdout_lines

    - name: Build Parrot template
      become: true
      command: "{{ template_script_dest }} parrot"
      register: parrot_build

    - name: Show Parrot build output
      debug:
        var: parrot_build.stdout_lines

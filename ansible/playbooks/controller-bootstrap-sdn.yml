---
- name: Bootstrap Proxmox SDN from controller
  hosts: proxmox_targets
  gather_facts: false

  vars:
    zone_name: "{{ proxmox_sdn.zone.name }}"
    zone_type: "{{ proxmox_sdn.zone.type }}"
    zone_dhcp: "{{ proxmox_sdn.zone.dhcp }}"
    zone_ipam: "{{ proxmox_sdn.zone.ipam }}"
    zone_mtu: "{{ proxmox_sdn.zone.mtu }}"

  tasks:
    - name: Check whether SDN zone exists
      ansible.builtin.command:
        argv:
          - pvesh
          - get
          - "/cluster/sdn/zones/{{ zone_name }}"
      register: sdn_zone_check
      failed_when: false
      changed_when: false

    - name: Create SDN zone
      ansible.builtin.command:
        argv:
          - pvesh
          - create
          - /cluster/sdn/zones
          - --zone
          - "{{ zone_name }}"
          - --type
          - "{{ zone_type }}"
          - --dhcp
          - "{{ zone_dhcp }}"
          - --ipam
          - "{{ zone_ipam }}"
          - --mtu
          - "{{ zone_mtu | string }}"
      when: sdn_zone_check.rc != 0

    - name: Check whether VNET exists
      ansible.builtin.command:
        argv:
          - pvesh
          - get
          - "/cluster/sdn/vnets/{{ item.name }}"
      loop: "{{ proxmox_sdn.vnets }}"
      loop_control:
        label: "{{ item.name }}"
      register: vnet_checks
      failed_when: false
      changed_when: false

    - name: Create VNETs
      ansible.builtin.command:
        argv:
          - pvesh
          - create
          - /cluster/sdn/vnets
          - --vnet
          - "{{ item.item.name }}"
          - --zone
          - "{{ zone_name }}"
          - --alias
          - "{{ item.item.alias }}"
          - --isolate-ports
          - "{{ 1 if item.item.isolate_ports else 0 }}"
      loop: "{{ vnet_checks.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when: item.rc != 0

    - name: Apply SDN configuration
      ansible.builtin.command:
        argv:
          - pvesh
          - set
          - /cluster/sdn
      register: sdn_apply
      changed_when: sdn_apply.rc == 0

    - name: Reload networking
      ansible.builtin.command:
        argv:
          - ifreload
          - -a
      register: ifreload_result
      changed_when: ifreload_result.rc == 0

    - name: Show resulting SDN zones
      ansible.builtin.command:
        argv:
          - pvesh
          - get
          - /cluster/sdn/zones
          - --output-format
          - yaml
      register: zones_out
      changed_when: false

    - name: Show resulting SDN vnets
      ansible.builtin.command:
        argv:
          - pvesh
          - get
          - /cluster/sdn/vnets
          - --output-format
          - yaml
      register: vnets_out
      changed_when: false

    - name: Print SDN summary
      ansible.builtin.debug:
        msg:
          - "{{ zones_out.stdout }}"
          - "{{ vnets_out.stdout }}"

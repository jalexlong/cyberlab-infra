---
bootstrap:
  proxmox:
    automation_user: "cyberlab-automation@pve"
    automation_token_id: "automation"
    api_host: 10.64.62.200
    rotate_token_if_secret_missing: true

  controller_lxc:
    ctid: 800
    hostname: "cyberlab-ctrl"
    ostemplate: "debian-13-standard"
    cores: 2
    memory_mb: 4096
    disk_gb: 32
    bridge: "vmbr0"
    unprivileged: true
    start_on_boot: true

  tooling:
    apt_packages:
      - git
      - curl
      - sudo
      - python3
      - python3-pip
      - python3-venv
      - python3-yaml
      - openssh-client
      - ansible

vmid_policy:
  reserved_ranges:
    infrastructure:
      start: 800
      end: 899
      purpose: "Cyberlab infrastructure, control-plane services, and shared support services."
      assignments:
        800: "Cyberlab automation controller LXC"
        801: "Reserved for future apt-cache or package mirror service"
      notes:
        - "Infrastructure VMIDs are manually assigned and should remain stable across rebuilds."
        - "These systems manage or support the platform and are not classroom workloads."

    golden_templates:
      start: 900
      end: 949
      purpose: "Promoted golden VM templates validated for classroom/lab cloning."
      assignments:
        900: "tpl-debian13-base"
        901: "tpl-ubuntu2604-base"
        902: "tpl-parrot-base"
        903: "tpl-win7-base"
        904: "tpl-metasploitable2-base"
      notes:
        - "Templates in this range may be consumed by deployment automation only after validation."
        - "Template metadata lives in ansible/vars/templates.yml."
        - "Each template should have a stable short id such as debian13, ubuntu2604, parrot, win7, or metasploitable2."

    validation_clones:
      start: 950
      end: 999
      purpose: "Disposable test clones used to validate promoted templates before broader deployment."
      assignments:
        950: "Debian 13 validation clone"
        951: "Ubuntu 26.04 validation clone"
        952: "Parrot validation clone"
        953: "Windows 7 validation clone"
        954: "Metasploitable 2 validation clone"
      notes:
        - "Validation clones are disposable."
        - "They must not be treated as golden source templates."
        - "They are used to prove boot, login, network, DHCP, and guest behavior."

    classroom_workloads:
      start: 100000000
      end: 999999999
      purpose: "Teacher and student lab VMs generated from the structured Cyberlab VMID scheme."
      formula: "teacher_id * 1000000 + section_code * 1000 + offset"
      notes:
        - "This range is governed by the Cyberlab structured VMID format."
        - "Teacher ID, section code, and role/offset encode ownership and placement."
        - "This range must remain disjoint from infrastructure, templates, and validation clones."

  rules:
    - "Do not assign VMIDs ad hoc outside the reserved ranges."
    - "Do not reuse infrastructure VMIDs for templates or classroom workloads."
    - "Do not reuse golden template VMIDs for validation clones or non-template systems."
    - "Validation clones are disposable and must not be treated as source templates."
    - "Do not deploy classroom workloads from unvalidated golden templates."
    - "Before template promotion, restore clone-default networking to DHCP where supported."
    - "If a range changes, update bootstrap-policy.yml, ansible/vars/templates.yml, README.md, and template lifecycle documentation together."

  allocation_strategy:
    infrastructure: "Manually assigned from 800-899."
    golden_templates: "Statically assigned per template definition in ansible/vars/templates.yml."
    validation_clones: "Statically assigned per template definition as test_clone_vmid."
    classroom_workloads: "Programmatically assigned from the structured Cyberlab VMID scheme."

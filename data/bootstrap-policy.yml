bootstrap:
  proxmox:
    automation_user: "cyberlab-automation@pve"
    automation_token_id: "automation"

  controller_lxc:
    ctid: 800
    hostname: "cyberlab-ctrl"
    ostemplate: "debian-13-standard"
    cores: 2
    memory_mb: 4096
    disk_gb: 32
    bridge: "vmbr0"
    unprivileged: true
    start_on_boot: true

  tooling:
    apt_packages:
      - git
      - curl
      - sudo
      - python3
      - python3-pip
      - python3-venv
      - python3-yaml
      - openssh-client
      - ansible

vmid_policy:
  reserved_ranges:
    infra_controllers:
      start: 800
      end: 849
      purpose: "Automation LXCs, controller services, and non-classroom control-plane infrastructure."
      examples:
        - "800 = cyberlab-ctrl"
      notes:
        - "Use for systems that manage the platform rather than participate in classroom activities."
        - "Prefer LXCs here unless a full VM is specifically required."

    shared_infra:
      start: 850
      end: 889
      purpose: "Shared platform support systems such as package mirrors, logging, backup helpers, monitoring, or future internal services."
      examples: []
      notes:
        - "Reserve for Cyberlab infrastructure that is not the main automation controller."
        - "Keeps support services separate from templates and classroom resources."

    candidate_templates:
      start: 8901
      end: 8999
      purpose: "Candidate templates awaiting validation and promotion."
      examples:
        - "8901 = parrot-candidate"
        - "8902 = win7-candidate"
        - "8903 = debian13-candidate"
        - "8904 = metasploitable2-candidate"
      notes:
        - "Candidates must never be consumed directly by OpenTofu lab deployment."
        - "Every candidate must pass validation before promotion."

    approved_templates:
      start: 9001
      end: 9099
      purpose: "Approved templates validated for deployment."
      examples:
        - "9001 = parrot-template"
        - "9002 = win7-template"
        - "9003 = debian13-template"
        - "9004 = metasploitable2-template"
      notes:
        - "Only approved templates may be referenced by environment files and deployment automation."
        - "Promotion should be explicit and documented."

    classroom_workloads:
      start: 100000000
      end: 999999999
      purpose: "Teacher and student lab VMs generated from the structured Cyberlab VMID scheme."
      examples:
        - "TTTSSS0XX = teacher VMs"
        - "TTTSSS1XX and above = student VMs"
      notes:
        - "This range is governed by the Cyberlab structured VMID format."
        - "Teacher ID, section code, and role/offset encode ownership and placement."
        - "This range must remain disjoint from infra and template ranges."

  rules:
    - "Do not assign VMIDs ad hoc outside the reserved ranges."
    - "Do not reuse candidate or approved template VMIDs for non-template systems."
    - "Do not deploy classroom workloads from candidate template VMIDs."
    - "Infra/controller VMIDs should stay stable across rebuilds where practical."
    - "If a range must change, update bootstrap-policy.yml, template metadata, and documentation together."

  allocation_strategy:
    infra_controllers: "Manually assigned from the infra_controllers range."
    shared_infra: "Manually assigned from the shared_infra range."
    candidate_templates: "Statically assigned per template definition in data/templates.yml."
    approved_templates: "Statically assigned per template definition in data/templates.yml."
    classroom_workloads: "Programmatically assigned from the structured Cyberlab VMID scheme."
